<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | University Dashboard</title>
    <link rel="stylesheet" href="css/admin-style.css" />
  </head>
  <body>
    <div class="glass-panel">
      <h1>Welcome Back</h1>
      <p class="subtitle">Enter your admin credentials to continue</p>

      <form id="loginForm">
        <div class="input-group">
          <label for="email">Admin Email</label>
          <input
            type="email"
            id="email"
            placeholder="admin@university.edu"
            value="admin@university.edu"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            value="adminpassword"
            required
          />
        </div>

        <button type="submit" class="primary-btn" id="loginBtn">Sign In</button>
        <div id="errorMessage" class="error-message">
          Invalid credentials. Please try again.
        </div>
      </form>
    </div>

    <script src="js/admin-logic.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
